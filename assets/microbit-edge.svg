<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">

  <!-- PCB body (back/bottom view) -->
  <rect x="60" y="20" width="200" height="130" rx="8" fill="#1a2a1a" stroke="#3db166" stroke-width="2"/>

  <!-- Board label -->
  <text x="160" y="85" text-anchor="middle" font-size="11" fill="#3db166" font-weight="700">micro:bit V2</text>
  <text x="160" y="100" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.4)">Back of board</text>

  <!-- Processor / main chip -->
  <rect x="120" y="45" width="80" height="55" rx="2" fill="#263a5e" stroke="#3db166" stroke-width="1"/>
  <text x="160" y="68" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.5)">nRF52833</text>
  <text x="160" y="80" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.35)">processor</text>

  <!-- Battery JST connector -->
  <rect x="68" y="50" width="30" height="16" rx="2" fill="#444" stroke="#888" stroke-width="1"/>
  <text x="83" y="61" text-anchor="middle" font-size="7" fill="#aaa">JST</text>
  <text x="40" y="58" text-anchor="middle" font-size="7.5" fill="#86efac">Battery</text>
  <line x1="68" y1="58" x2="55" y2="58" stroke="#3db166" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Edge connector gold rail -->
  <rect x="60" y="142" width="200" height="8" fill="#c8a44a"/>

  <!-- Large pads: P0, P1, P2, 3V, GND -->
  <rect x="66" y="142" width="22" height="24" rx="1" fill="#c8a44a" stroke="#a07830" stroke-width="1"/>
  <rect x="111" y="142" width="22" height="24" rx="1" fill="#c8a44a" stroke="#a07830" stroke-width="1"/>
  <rect x="157" y="142" width="22" height="24" rx="1" fill="#c8a44a" stroke="#a07830" stroke-width="1"/>
  <rect x="202" y="142" width="18" height="24" rx="1" fill="#c8a44a" stroke="#a07830" stroke-width="1"/>
  <rect x="232" y="142" width="20" height="24" rx="1" fill="#888" stroke="#666" stroke-width="1"/>

  <!-- Small pads in between -->
  <g fill="#a07830" stroke="#c8a44a" stroke-width="0.5">
    <rect x="91" y="142" width="8" height="14"/>
    <rect x="102" y="142" width="8" height="14"/>
    <rect x="136" y="142" width="8" height="14"/>
    <rect x="147" y="142" width="8" height="14"/>
    <rect x="182" y="142" width="8" height="14"/>
    <rect x="193" y="142" width="8" height="14"/>
    <rect x="223" y="142" width="7" height="14"/>
  </g>

  <!-- V2 notch -->
  <rect x="147" y="150" width="12" height="16" rx="2" fill="#1a2a1a" stroke="#3db166" stroke-width="0.5"/>

  <!-- Labels for large pads -->
  <text x="77" y="173" text-anchor="middle" font-size="8" fill="#c8a44a" font-weight="700">P0</text>
  <text x="122" y="173" text-anchor="middle" font-size="8" fill="#c8a44a" font-weight="700">P1</text>
  <text x="168" y="173" text-anchor="middle" font-size="8" fill="#c8a44a" font-weight="700">P2</text>
  <text x="211" y="173" text-anchor="middle" font-size="8" fill="#c8a44a" font-weight="700">3V</text>
  <text x="242" y="173" text-anchor="middle" font-size="8" fill="#aaa" font-weight="700">GND</text>

  <!-- Crocodile clip callout -->
  <text x="160" y="195" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.55)">Large pads: crocodile clips fit directly</text>
  <text x="160" y="207" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.55)">Small pads: edge connector breakout board</text>

</svg>
