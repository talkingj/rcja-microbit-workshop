<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">

  <!-- PCB body -->
  <rect x="60" y="20" width="200" height="180" rx="8" fill="#1a3a1a" stroke="#3db166" stroke-width="2"/>

  <!-- USB-C port top centre -->
  <rect x="140" y="14" width="40" height="14" rx="3" fill="#888" stroke="#666" stroke-width="1"/>
  <text x="160" y="12" text-anchor="middle" font-size="8" fill="#3db166">USB-C</text>

  <!-- Microphone indicator (V2) top-left area -->
  <circle cx="88" cy="38" r="5" fill="none" stroke="#3db166" stroke-width="1.5"/>
  <circle cx="88" cy="38" r="2" fill="#3db166"/>
  <text x="88" y="53" text-anchor="middle" font-size="7.5" fill="#86efac">MIC</text>

  <!-- Touch logo (V2) gold oval, centre top -->
  <ellipse cx="160" cy="56" rx="16" ry="10" fill="#c8a44a" stroke="#a07830" stroke-width="1"/>
  <text x="160" y="59.5" text-anchor="middle" font-size="7" fill="#1a1a00" font-weight="700">LOGO</text>
  <text x="160" y="71" text-anchor="middle" font-size="7.5" fill="#86efac">Touch (V2)</text>

  <!-- 5×5 LED matrix -->
  <rect x="110" y="82" width="100" height="80" rx="2" fill="#111" stroke="#3db166" stroke-width="1.5"/>
  <text x="160" y="176" text-anchor="middle" font-size="8" fill="#3db166">5×5 LED display</text>
  <!-- LED dots -->
  <g fill="#cc2200">
    <!-- row 1 -->
    <rect x="118" y="90" width="10" height="10" rx="1"/>
    <rect x="133" y="90" width="10" height="10" rx="1"/>
    <rect x="148" y="90" width="10" height="10" rx="1"/>
    <rect x="163" y="90" width="10" height="10" rx="1"/>
    <rect x="178" y="90" width="10" height="10" rx="1"/>
    <!-- row 2 -->
    <rect x="118" y="105" width="10" height="10" rx="1"/>
    <rect x="133" y="105" width="10" height="10" rx="1"/>
    <rect x="148" y="105" width="10" height="10" rx="1"/>
    <rect x="163" y="105" width="10" height="10" rx="1"/>
    <rect x="178" y="105" width="10" height="10" rx="1"/>
    <!-- row 3 -->
    <rect x="118" y="120" width="10" height="10" rx="1"/>
    <rect x="133" y="120" width="10" height="10" rx="1"/>
    <rect x="148" y="120" width="10" height="10" rx="1" fill="#ff4400"/>
    <rect x="163" y="120" width="10" height="10" rx="1"/>
    <rect x="178" y="120" width="10" height="10" rx="1"/>
    <!-- row 4 -->
    <rect x="118" y="135" width="10" height="10" rx="1"/>
    <rect x="133" y="135" width="10" height="10" rx="1"/>
    <rect x="148" y="135" width="10" height="10" rx="1"/>
    <rect x="163" y="135" width="10" height="10" rx="1"/>
    <rect x="178" y="135" width="10" height="10" rx="1"/>
    <!-- row 5 -->
    <rect x="118" y="150" width="10" height="10" rx="1"/>
    <rect x="133" y="150" width="10" height="10" rx="1"/>
    <rect x="148" y="150" width="10" height="10" rx="1"/>
    <rect x="163" y="150" width="10" height="10" rx="1"/>
    <rect x="178" y="150" width="10" height="10" rx="1"/>
  </g>

  <!-- Button A (left) -->
  <rect x="68" y="108" width="28" height="22" rx="3" fill="#263a5e" stroke="#3db166" stroke-width="1.5"/>
  <circle cx="82" cy="119" r="8" fill="#1b2945" stroke="#3db166" stroke-width="1"/>
  <text x="82" y="122.5" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">A</text>
  <text x="40" y="122" text-anchor="middle" font-size="8" fill="#86efac">Button A</text>
  <line x1="66" y1="119" x2="50" y2="119" stroke="#3db166" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Button B (right) -->
  <rect x="224" y="108" width="28" height="22" rx="3" fill="#263a5e" stroke="#3db166" stroke-width="1.5"/>
  <circle cx="238" cy="119" r="8" fill="#1b2945" stroke="#3db166" stroke-width="1"/>
  <text x="238" y="122.5" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">B</text>
  <text x="280" y="122" text-anchor="middle" font-size="8" fill="#86efac">Button B</text>
  <line x1="254" y1="119" x2="270" y2="119" stroke="#3db166" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Speaker (V2) — bottom right of PCB -->
  <circle cx="224" cy="168" r="10" fill="#111" stroke="#3db166" stroke-width="1"/>
  <circle cx="224" cy="168" r="4" fill="none" stroke="#3db166" stroke-width="0.8"/>
  <circle cx="224" cy="168" r="1.5" fill="#3db166"/>
  <text x="280" y="164" text-anchor="middle" font-size="7.5" fill="#86efac">Speaker</text>
  <text x="280" y="173" text-anchor="middle" font-size="7.5" fill="#86efac">(V2)</text>
  <line x1="254" y1="168" x2="270" y2="168" stroke="#3db166" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Edge connector gold pads -->
  <rect x="60" y="192" width="200" height="8" fill="#c8a44a"/>
  <text x="160" y="210" text-anchor="middle" font-size="8" fill="#3db166">Edge connector (25 pins)</text>
  <!-- Large pads P0 P1 P2 3V GND -->
  <rect x="68" y="192" width="20" height="8" fill="#a07830" stroke="#c8a44a" stroke-width="0.5"/>
  <rect x="114" y="192" width="20" height="8" fill="#a07830" stroke="#c8a44a" stroke-width="0.5"/>
  <rect x="160" y="192" width="20" height="8" fill="#a07830" stroke="#c8a44a" stroke-width="0.5"/>
  <rect x="206" y="192" width="16" height="8" fill="#c8a44a" stroke="#a07830" stroke-width="0.5"/>
  <rect x="236" y="192" width="16" height="8" fill="#888" stroke="#666" stroke-width="0.5"/>
  <text x="78" y="188" text-anchor="middle" font-size="6.5" fill="#c8a44a">P0</text>
  <text x="124" y="188" text-anchor="middle" font-size="6.5" fill="#c8a44a">P1</text>
  <text x="170" y="188" text-anchor="middle" font-size="6.5" fill="#c8a44a">P2</text>
  <text x="214" y="188" text-anchor="middle" font-size="6.5" fill="#c8a44a">3V</text>
  <text x="244" y="188" text-anchor="middle" font-size="6.5" fill="#aaa">GND</text>

  <!-- Notch V2 indicator -->
  <rect x="148" y="198" width="10" height="8" rx="2" fill="#1a3a1a" stroke="#3db166" stroke-width="0.5"/>
  <text x="153" y="220" text-anchor="middle" font-size="7" fill="#3db166">V2 notch</text>
  <line x1="153" y1="218" x2="153" y2="208" stroke="#3db166" stroke-width="0.8" stroke-dasharray="2,2"/>

</svg>
