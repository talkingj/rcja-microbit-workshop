<svg viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">

  <!-- Title -->
  <text x="180" y="14" text-anchor="middle" font-size="9" fill="#3db166" font-weight="700" text-transform="uppercase" letter-spacing="1">Kit contents</text>

  <!-- ── micro:bit board ── -->
  <rect x="10" y="25" width="70" height="55" rx="4" fill="#1a3a1a" stroke="#3db166" stroke-width="1.5"/>
  <!-- LED matrix miniature -->
  <g fill="#cc2200">
    <rect x="24" y="34" width="4" height="4"/><rect x="30" y="34" width="4" height="4"/><rect x="36" y="34" width="4" height="4"/><rect x="42" y="34" width="4" height="4"/><rect x="48" y="34" width="4" height="4"/>
    <rect x="24" y="40" width="4" height="4"/><rect x="30" y="40" width="4" height="4"/><rect x="36" y="40" width="4" height="4"/><rect x="42" y="40" width="4" height="4"/><rect x="48" y="40" width="4" height="4"/>
    <rect x="24" y="46" width="4" height="4"/><rect x="30" y="46" width="4" height="4"/><rect x="36" y="46" width="4" height="4"/><rect x="42" y="46" width="4" height="4"/><rect x="48" y="46" width="4" height="4"/>
  </g>
  <!-- Edge pads -->
  <rect x="10" y="72" width="70" height="5" fill="#c8a44a"/>
  <text x="45" y="88" text-anchor="middle" font-size="8.5" fill="#fff" font-weight="600">micro:bit V2</text>

  <!-- ── motor:bit carrier board ── -->
  <rect x="100" y="25" width="90" height="65" rx="3" fill="#1b2945" stroke="#3db166" stroke-width="1.5"/>
  <text x="145" y="44" text-anchor="middle" font-size="7.5" fill="#3db166" font-weight="700">motor:bit</text>
  <!-- Motor terminals -->
  <rect x="107" y="50" width="18" height="12" rx="1" fill="#263a5e" stroke="#3db166" stroke-width="1"/>
  <text x="116" y="59" text-anchor="middle" font-size="6" fill="#86efac">M1</text>
  <rect x="171" y="50" width="18" height="12" rx="1" fill="#263a5e" stroke="#3db166" stroke-width="1"/>
  <text x="180" y="59" text-anchor="middle" font-size="6" fill="#86efac">M2</text>
  <!-- GVS ports -->
  <rect x="130" y="50" width="8" height="10" rx="1" fill="#c8a44a"/>
  <rect x="142" y="50" width="8" height="10" rx="1" fill="#c8a44a"/>
  <rect x="154" y="50" width="8" height="10" rx="1" fill="#c8a44a"/>
  <text x="145" y="70" text-anchor="middle" font-size="6.5" fill="rgba(255,255,255,0.4)">GVS sensor ports</text>
  <!-- Edge socket -->
  <rect x="107" y="78" width="76" height="10" rx="1" fill="#888" stroke="#666" stroke-width="1"/>
  <text x="145" y="86" text-anchor="middle" font-size="6" fill="#111">edge connector socket</text>
  <text x="145" y="100" text-anchor="middle" font-size="8.5" fill="#fff" font-weight="600">motor:bit board</text>

  <!-- ── TT Motors (×2) ── -->
  <!-- Motor left -->
  <rect x="10" y="115" width="50" height="28" rx="3" fill="#333" stroke="#888" stroke-width="1.5"/>
  <rect x="10" y="125" width="8" height="8" rx="1" fill="#888"/>
  <circle cx="56" cy="129" r="6" fill="#555" stroke="#888" stroke-width="1"/>
  <text x="35" y="152" text-anchor="middle" font-size="8" fill="#fff">TT motor ×2</text>

  <!-- Motor right -->
  <rect x="68" y="115" width="50" height="28" rx="3" fill="#333" stroke="#888" stroke-width="1.5"/>
  <rect x="110" y="125" width="8" height="8" rx="1" fill="#888"/>
  <circle cx="72" cy="129" r="6" fill="#555" stroke="#888" stroke-width="1"/>

  <!-- ── IR Tracking sensor bar ── -->
  <rect x="136" y="115" width="80" height="22" rx="3" fill="#1b2945" stroke="#3db166" stroke-width="1.5"/>
  <circle cx="158" cy="126" r="6" fill="#111" stroke="#3db166" stroke-width="1"/>
  <circle cx="196" cy="126" r="6" fill="#111" stroke="#3db166" stroke-width="1"/>
  <circle cx="158" cy="126" r="3" fill="#cc2200"/>
  <circle cx="196" cy="126" r="3" fill="#cc2200"/>
  <text x="176" y="146" text-anchor="middle" font-size="7.5" fill="#86efac">IR tracking sensor</text>
  <text x="176" y="155" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.4)">P3 (right) · P4 (left)</text>

  <!-- ── Ultrasonic sensor ── -->
  <rect x="230" y="115" width="60" height="35" rx="3" fill="#1b2945" stroke="#3db166" stroke-width="1.5"/>
  <circle cx="250" cy="132" r="9" fill="#111" stroke="#86efac" stroke-width="1.5"/>
  <circle cx="280" cy="132" r="9" fill="#111" stroke="#86efac" stroke-width="1.5"/>
  <circle cx="250" cy="132" r="5" fill="#86efac" opacity="0.3"/>
  <circle cx="280" cy="132" r="5" fill="#86efac" opacity="0.3"/>
  <text x="260" y="157" text-anchor="middle" font-size="7.5" fill="#86efac">ultrasonic</text>

  <!-- ── Battery pack 4×AA ── -->
  <rect x="230" y="25" width="105" height="80" rx="4" fill="#263a5e" stroke="#3db166" stroke-width="1.5"/>
  <text x="282" y="42" text-anchor="middle" font-size="8" fill="#3db166" font-weight="700">4×AA Battery Pack</text>
  <!-- AA cells -->
  <g fill="#888" stroke="#666" stroke-width="0.5">
    <rect x="242" y="50" width="18" height="42" rx="3"/>
    <rect x="264" y="50" width="18" height="42" rx="3"/>
    <rect x="286" y="50" width="18" height="42" rx="3"/>
    <rect x="308" y="50" width="18" height="42" rx="3"/>
  </g>
  <g fill="#c8a44a">
    <rect x="247" y="50" width="8" height="4" rx="1"/>
    <rect x="269" y="50" width="8" height="4" rx="1"/>
    <rect x="291" y="50" width="8" height="4" rx="1"/>
    <rect x="313" y="50" width="8" height="4" rx="1"/>
  </g>
  <text x="282" y="102" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.4)">~6V DC · powers motors</text>

  <!-- ── USB cable ── -->
  <text x="35" y="175" text-anchor="middle" font-size="8" fill="#fff">USB cable</text>
  <rect x="10" y="178" width="50" height="6" rx="2" fill="#555"/>
  <rect x="8" y="176" width="12" height="10" rx="2" fill="#444" stroke="#888" stroke-width="1"/>
  <text x="35" y="194" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.35)">for programming</text>

  <!-- ── Wheels (2) ── -->
  <ellipse cx="145" cy="188" rx="16" ry="10" fill="#333" stroke="#888" stroke-width="1.5"/>
  <ellipse cx="145" cy="188" rx="8" ry="5" fill="#555"/>
  <ellipse cx="185" cy="188" rx="16" ry="10" fill="#333" stroke="#888" stroke-width="1.5"/>
  <ellipse cx="185" cy="188" rx="8" ry="5" fill="#555"/>
  <text x="165" y="208" text-anchor="middle" font-size="8" fill="#fff">wheels ×2</text>

  <!-- Castor wheel -->
  <circle cx="265" cy="186" r="12" fill="#333" stroke="#888" stroke-width="1.5"/>
  <circle cx="265" cy="186" r="6" fill="#555"/>
  <text x="265" y="208" text-anchor="middle" font-size="8" fill="#fff">castor</text>

</svg>
