<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>micro:bit: What it is and why it works</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:       #1b2945;
  --navy-mid:   #263a5e;
  --green:      #3db166;
  --green-dark: #339655;
  --blue-tint:  #eef1f8;
  --border:     #d0d7e3;
  --border-lt:  #e4e8ef;
  --row-sep:    #f0f0f0;
  --surface:    #f4f6fa;
  --white:      #ffffff;
  --ink:        #0a0a0a;
  --label:      #3a3a3a;
  --muted:      #666666;
}

html { scroll-behavior: smooth; }

body {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  font-size: 15px;
  line-height: 1.65;
  color: var(--ink);
  background: var(--white);
  -webkit-tap-highlight-color: transparent;
}

a { color: var(--navy); text-underline-offset: 3px; }
a:hover { color: var(--green-dark); }
button { font-family: inherit; cursor: pointer; border-radius: 0; }
button:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }

/* ── TOP BAR ──────────────────────────────────── */
#top-bar {
  position: sticky; top: 0; z-index: 200;
  background: var(--navy);
  height: 52px;
  display: flex; align-items: center;
  padding: 0 24px;
  gap: 12px;
}
#top-bar h1 {
  font-size: 14px; font-weight: 700;
  letter-spacing: -0.01em; color: #fff;
  flex: 1; min-width: 0;
}
.top-pill {
  font-size: 10px; font-weight: 700;
  background: var(--green); color: var(--navy);
  padding: 3px 8px; white-space: nowrap; flex-shrink: 0;
  text-transform: uppercase; letter-spacing: 0.05em;
}

/* ── NAV ──────────────────────────────────────── */
#nav-bar {
  position: sticky; top: 52px; z-index: 100;
  background: var(--white);
  border-bottom: 2px solid var(--border-lt);
  overflow-x: auto; scrollbar-width: none;
}
#nav-bar::-webkit-scrollbar { display: none; }
#nav-inner { display: flex; min-width: max-content; padding: 0 24px; }
.nav-tab {
  padding: 0 16px; height: 44px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  background: none; border: none;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px; white-space: nowrap;
  transition: color 80ms, border-color 80ms;
}
.nav-tab:hover { color: var(--navy); }
.nav-tab.active { color: var(--navy); border-bottom-color: var(--green); }

/* ── PROGRESS BAR ─────────────────────────────── */
#progress {
  position: fixed; top: 0; left: 0; height: 3px;
  width: 0%; background: var(--green); z-index: 300;
  transition: width 80ms linear;
}

/* ── HERO ─────────────────────────────────────── */
#hero {
  background: var(--navy);
  padding: 52px 24px 48px;
}
.hero-inner { max-width: 900px; margin: 0 auto; }

#hero .kicker {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--green); margin-bottom: 16px;
}

#hero h2 {
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 700; letter-spacing: -0.035em;
  line-height: 1.1; color: #fff;
  text-wrap: balance; margin-bottom: 20px;
}

#hero .hero-body {
  font-size: 16px; color: rgba(255,255,255,0.6);
  max-width: 56ch; line-height: 1.65;
  margin-bottom: 36px;
}

.hero-stats {
  display: flex; flex-wrap: wrap; gap: 0;
  border: 1px solid rgba(255,255,255,0.12);
  width: fit-content;
}
.hero-stat {
  padding: 16px 24px;
  border-right: 1px solid rgba(255,255,255,0.12);
}
.hero-stat:last-child { border-right: none; }
.hs-val {
  font-size: 26px; font-weight: 700;
  color: #fff; letter-spacing: -0.03em;
  line-height: 1;
}
.hs-label {
  font-size: 11px; color: rgba(255,255,255,0.45);
  margin-top: 4px; white-space: nowrap;
}

/* ── PAGE BODY ────────────────────────────────── */
.page { max-width: 900px; margin: 0 auto; padding: 0 24px; }

/* ── SECTIONS ─────────────────────────────────── */
.section {
  padding: 52px 0;
  border-bottom: 1px solid var(--border-lt);
  scroll-margin-top: 98px;
}
.section:last-child { border-bottom: none; }

.section-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.09em;
  color: var(--green); margin-bottom: 10px;
}

.section-title {
  font-size: clamp(20px, 3vw, 28px);
  font-weight: 700; letter-spacing: -0.025em;
  color: var(--navy); line-height: 1.2;
  text-wrap: balance; margin-bottom: 16px;
}

.section-intro {
  font-size: 15px; color: var(--label);
  max-width: 68ch; line-height: 1.7;
  margin-bottom: 32px;
}

/* ── V1 VS V2 ─────────────────────────────────── */
.version-compare {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 32px;
}

.version-card {
  border: 1.5px solid var(--border);
  overflow: hidden;
}

.version-hdr {
  padding: 12px 16px;
  font-size: 13px; font-weight: 700;
  display: flex; align-items: center; gap: 10px;
}

.v1-hdr { background: var(--surface); color: var(--navy); }
.v2-hdr { background: var(--navy); color: #fff; }

.version-badge {
  font-size: 10px; font-weight: 700;
  padding: 2px 7px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.v1-badge { background: var(--border); color: var(--muted); }
.v2-badge { background: var(--green); color: var(--navy); }

.version-list {
  list-style: none;
  padding: 4px 0;
}
.version-list li {
  padding: 7px 16px;
  font-size: 12px; color: var(--label);
  border-bottom: 1px solid var(--row-sep);
  display: flex; align-items: center; gap: 8px;
}
.version-list li:last-child { border-bottom: none; }

.vl-dot {
  width: 6px; height: 6px; flex-shrink: 0;
  border-radius: 50%;
}
.v1-dot { background: var(--muted); }
.v2-dot { background: var(--green); }

/* ── HARDWARE GRID ────────────────────────────── */
.hw-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-bottom: 32px;
}

.hw-card {
  background: var(--white);
  padding: 20px;
  transition: background 80ms;
}
.hw-card:hover { background: var(--surface); }

.hw-icon {
  width: 36px; height: 36px;
  background: var(--navy);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px;
}

.hw-name {
  font-size: 13px; font-weight: 700;
  color: var(--navy); margin-bottom: 5px;
}

.hw-desc {
  font-size: 12px; color: var(--muted);
  line-height: 1.55;
}

.hw-tag {
  display: inline-block;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--green-dark);
  background: #e8f7ee;
  padding: 2px 6px;
  margin-top: 8px;
}

/* ── PROGRAMMING ──────────────────────────────── */
.lang-compare {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

.lang-card {
  border: 1.5px solid var(--border);
  overflow: hidden;
}

.lang-hdr {
  padding: 12px 16px;
  background: var(--navy);
  display: flex; align-items: center; justify-content: space-between;
}

.lang-name {
  font-size: 14px; font-weight: 700; color: #fff;
}

.lang-level {
  font-size: 10px; font-weight: 700;
  padding: 2px 7px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.level-beginner { background: var(--green); color: var(--navy); }
.level-advanced { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); }

.lang-body {
  padding: 14px 16px;
  font-size: 12px; color: var(--label);
  line-height: 1.6;
}

.lang-pros {
  list-style: none; margin-top: 10px;
}
.lang-pros li {
  padding: 3px 0;
  font-size: 12px; color: var(--muted);
  display: flex; gap: 8px; align-items: flex-start;
}
.lang-pros li::before {
  content: ''; width: 5px; height: 5px;
  background: var(--green); border-radius: 50%;
  margin-top: 6px; flex-shrink: 0;
}

/* ── SIMULATOR CALLOUT ────────────────────────── */
.sim-callout {
  background: var(--navy);
  padding: 24px 28px;
  display: flex; align-items: flex-start; gap: 20px;
  margin-bottom: 32px;
}

.sim-icon {
  width: 48px; height: 48px; min-width: 48px;
  background: var(--green);
  display: flex; align-items: center; justify-content: center;
}
.sim-icon svg { width: 24px; height: 24px; fill: var(--navy); }

.sim-title {
  font-size: 15px; font-weight: 700; color: #fff;
  margin-bottom: 6px;
}
.sim-body {
  font-size: 13px; color: rgba(255,255,255,0.6);
  line-height: 1.6; max-width: 60ch;
}
.sim-link {
  display: inline-block;
  margin-top: 12px;
  font-size: 12px; font-weight: 600;
  color: var(--green);
  text-decoration: none;
  border: 1px solid rgba(61,177,102,0.4);
  padding: 5px 12px;
  transition: background 80ms, border-color 80ms;
}
.sim-link:hover {
  background: rgba(61,177,102,0.1);
  border-color: var(--green);
}

/* ── PROJECT GALLERY ──────────────────────────── */
.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}

.project-card {
  border: 1.5px solid var(--border);
  overflow: hidden;
}

.project-stripe { height: 5px; }

.project-img {
  height: 160px;
  background: var(--surface);
  overflow: hidden;
  border-bottom: 1px solid var(--border-lt);
}
.project-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

.project-body { padding: 16px; }

.project-domain {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted); margin-bottom: 6px;
}

.project-name {
  font-size: 14px; font-weight: 700;
  color: var(--navy); margin-bottom: 6px; line-height: 1.3;
}

.project-desc {
  font-size: 12px; color: var(--label);
  line-height: 1.55;
}

.project-tags {
  display: flex; flex-wrap: wrap; gap: 5px;
  margin-top: 12px;
}

.tag {
  font-size: 10px; font-weight: 600;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 2px 7px;
}

/* ── TEACHER PITCH ────────────────────────────── */
.pitch-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-bottom: 32px;
}

.pitch-card {
  background: var(--white);
  padding: 24px 20px;
}

.pitch-num {
  font-size: 32px; font-weight: 700;
  color: var(--border);
  letter-spacing: -0.04em;
  line-height: 1; margin-bottom: 12px;
}

.pitch-title {
  font-size: 14px; font-weight: 700;
  color: var(--navy); margin-bottom: 6px;
}

.pitch-body {
  font-size: 13px; color: var(--muted);
  line-height: 1.6;
}

/* ── ROBOCUP SECTION ──────────────────────────── */
.rcja-banner {
  background: var(--navy);
  padding: 28px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 24px;
  align-items: center;
  margin-bottom: 28px;
}

.rcja-title {
  font-size: 18px; font-weight: 700;
  color: #fff; margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.rcja-sub {
  font-size: 13px; color: rgba(255,255,255,0.55);
  max-width: 52ch; line-height: 1.6;
}

.rcja-badge {
  background: var(--green);
  padding: 10px 16px;
  text-align: center; flex-shrink: 0;
}
.rcja-badge-val {
  font-size: 28px; font-weight: 700;
  color: var(--navy); letter-spacing: -0.03em;
  line-height: 1;
}
.rcja-badge-label {
  font-size: 10px; font-weight: 700;
  color: var(--navy-mid);
  text-transform: uppercase; letter-spacing: 0.06em;
  margin-top: 3px;
}

.map-table {
  width: 100%;
  border-collapse: collapse;
  border: 1.5px solid var(--border);
  margin-bottom: 20px;
  font-size: 13px;
}
.map-table th {
  background: var(--navy);
  color: #fff;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.07em;
  padding: 9px 14px;
  text-align: left;
  border-right: 1px solid var(--navy-mid);
}
.map-table th:last-child { border-right: none; }
.map-table td {
  padding: 10px 14px;
  border-right: 1px solid var(--border-lt);
  border-bottom: 1px solid var(--row-sep);
  color: var(--label); vertical-align: top;
}
.map-table td:last-child { border-right: none; }
.map-table tr:last-child td { border-bottom: none; }
.map-table td:first-child { font-weight: 600; color: var(--ink); }

.rule-ref {
  font-family: 'Courier New', monospace;
  font-size: 11px; color: var(--muted);
  white-space: nowrap;
}

/* ── CALLOUT ──────────────────────────────────── */
.callout {
  border: 1.5px solid var(--border);
  border-left: 4px solid var(--green);
  background: var(--surface);
  padding: 14px 16px;
  font-size: 13px; color: var(--label);
  line-height: 1.6; margin-bottom: 20px;
}
.callout strong { color: var(--ink); }

/* ── CODE SECTION ─────────────────────────────── */
#s-code {
  scroll-margin-top: 98px;
}

/* ── CODE REFERENCE (added by facilitator) ────── */
.code-ref {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px;
  text-align: left;
}
.code-ref-section {
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid var(--border-lt);
}
.code-ref-section:first-child { border-top: none; margin-top: 32px; }
.code-ref h3 {
  font-size: 16px; font-weight: 700;
  color: var(--navy); margin-bottom: 12px;
  letter-spacing: -0.02em;
}
.code-block {
  background: var(--navy);
  border: 1px solid var(--navy-mid);
  padding: 20px 24px;
  font-family: 'Courier New', Courier, monospace;
  font-size: 13px;
  line-height: 1.7;
  color: rgba(255,255,255,0.85);
  overflow-x: auto;
  margin-bottom: 16px;
  white-space: pre;
}
.code-block .cm { color: rgba(255,255,255,0.35); }  /* comment */
.code-block .kw { color: #7dd3fc; }                 /* keyword */
.code-block .st { color: #86efac; }                 /* string */
.code-block .fn { color: #fde68a; }                 /* function */
.code-block .nm { color: #f9a8d4; }                 /* number */
.code-filename {
  background: var(--navy-mid);
  color: rgba(255,255,255,0.5);
  font-family: 'Courier New', monospace;
  font-size: 11px;
  padding: 5px 14px;
  letter-spacing: 0.03em;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.pin-table {
  width: 100%;
  border-collapse: collapse;
  border: 1.5px solid var(--border);
  font-size: 13px;
  margin-bottom: 24px;
}
.pin-table th {
  background: var(--navy); color: #fff;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.07em;
  padding: 8px 12px; text-align: left;
  border-right: 1px solid var(--navy-mid);
}
.pin-table th:last-child { border-right: none; }
.pin-table td {
  padding: 8px 12px;
  border-right: 1px solid var(--border-lt);
  border-bottom: 1px solid var(--row-sep);
  color: var(--label);
}
.pin-table td:last-child { border-right: none; }
.pin-table tr:last-child td { border-bottom: none; }
.pin-table code {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  background: var(--surface);
  padding: 1px 5px;
  border: 1px solid var(--border);
}

/* ── SETUP STEPS ──────────────────────────────── */
ol.setup-steps {
  padding-left: 20px;
  margin-bottom: 20px;
}
ol.setup-steps li {
  font-size: 14px; color: var(--label);
  line-height: 1.65; padding: 4px 0;
}
ol.setup-steps code {
  font-family: 'Courier New', monospace;
  font-size: 12px; background: var(--surface);
  padding: 1px 5px; border: 1px solid var(--border);
}

/* ── MAKECODE EMBED ───────────────────────────── */
.makecode-embed {
  border: 1.5px solid var(--border);
  overflow: hidden;
  margin-bottom: 24px;
}
.makecode-header {
  background: var(--navy);
  padding: 8px 14px;
  font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7);
  display: flex; align-items: center; gap: 8px;
}
.makecode-header svg { flex-shrink: 0; color: var(--green); }
.makecode-open {
  margin-left: auto;
  font-size: 11px; color: var(--green);
  text-decoration: none; font-weight: 600;
}
.makecode-open:hover { color: #fff; }
.makecode-embed iframe {
  width: 100%; height: 660px;
  display: block; border: none;
}
.makecode-launch {
  display: flex; align-items: center; gap: 20px;
  background: var(--navy);
  border: 1.5px solid var(--border);
  padding: 24px 28px;
  text-decoration: none;
  margin-bottom: 24px;
  transition: border-color 0.15s, background 0.15s;
}
.makecode-launch:hover { border-color: var(--green); background: #0f1e2f; }
.makecode-launch-icon { color: var(--green); flex-shrink: 0; }
.makecode-launch-body { flex: 1; }
.makecode-launch-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.makecode-launch-sub { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.5; }
.makecode-launch-arrow { font-size: 22px; color: var(--green); flex-shrink: 0; }

.makecode-placeholder {
  background: var(--navy);
  border: 2px dashed var(--navy-mid);
  padding: 36px 24px;
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  text-align: center; margin-bottom: 24px;
}
.mcp-label {
  font-size: 13px; font-weight: 700;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase; letter-spacing: 0.07em;
}
.mcp-hint {
  font-size: 12px; color: rgba(255,255,255,0.3);
  max-width: 52ch; line-height: 1.6;
}
.mcp-hint code {
  font-family: 'Courier New', monospace;
  font-size: 11px; color: var(--green);
  background: rgba(255,255,255,0.05);
  padding: 1px 5px;
}

/* ── CODE PLACEHOLDER BLOCK ───────────────────── */
.code-placeholder-block {
  background: var(--navy);
  border: 2px dashed var(--navy-mid);
  padding: 32px 24px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; text-align: center;
  margin-bottom: 16px;
  color: rgba(255,255,255,0.35);
}
.code-placeholder-block span {
  font-size: 13px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.07em;
}
.code-placeholder-block svg { color: rgba(255,255,255,0.25); }
pre.code-hint {
  font-family: 'Courier New', monospace;
  font-size: 11px; color: rgba(255,255,255,0.25);
  line-height: 1.6; margin: 0; white-space: pre-wrap;
  text-align: left;
}

/* ── RESPONSIVE ───────────────────────────────── */
@media (max-width: 640px) {
  .page { padding: 0 16px; }
  #top-bar, #nav-inner { padding-left: 16px; padding-right: 16px; }
  #hero { padding: 36px 16px 32px; }
  .version-compare, .lang-compare { grid-template-columns: 1fr; }
  .rcja-banner { grid-template-columns: 1fr; }
  .sim-callout { flex-direction: column; gap: 12px; }
  .hero-stats { flex-direction: column; width: 100%; }
  .hero-stat { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.12); }
  .hero-stat:last-child { border-bottom: none; }
  .code-ref { padding: 0 16px; }
}

/* ── PHOTO PLACEHOLDER ────────────────────────── */
.photo-slot {
  background: var(--navy);
  border: 2px dashed var(--navy-mid);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
  min-height: 220px;
  color: rgba(255,255,255,0.35);
  font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  text-align: center; padding: 20px;
  overflow: hidden;
}
.photo-slot img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.photo-slot svg { opacity: 0.3; }
.photo-slot span { opacity: 0.5; }

/* Diagram slot: holds SVG illustrations (or real photos once available) */
.diagram-slot {
  background: var(--navy);
  border: 1.5px solid var(--border);
  overflow: hidden;
  min-height: 220px;
  display: flex; align-items: center; justify-content: center;
}
.diagram-slot img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  padding: 12px;
}

.photo-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 32px;
}

/* ── TIMING TABLE ────────────────────────────── */
.timing-table td:first-child {
  white-space: nowrap;
  font-weight: 600;
  color: var(--navy);
  font-variant-numeric: tabular-nums;
}
.pres-slide .timing-table td:first-child { color: var(--green); }
.pres-slide .timing-table td { color: rgba(255,255,255,0.6); }

/* ── ACTIVITY CARDS (RoboCup section) ────────── */
.activity-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-bottom: 28px;
}
.activity-card {
  background: var(--white);
  padding: 22px 20px;
}
.activity-num {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--green); margin-bottom: 8px;
}
.activity-title {
  font-size: 15px; font-weight: 700;
  color: var(--navy); margin-bottom: 4px;
}
.activity-cap {
  font-size: 11px; color: var(--muted);
  margin-bottom: 10px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.activity-desc {
  font-size: 13px; color: var(--label);
  line-height: 1.6;
}

/* ── PRESENTATION OVERLAY ─────────────────────── */
#pres-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 1000;
  background: var(--navy);
  flex-direction: column;
}

body.presenting { overflow: hidden; }
body.presenting #pres-overlay { display: flex; }

#pres-slides {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.pres-slide {
  position: absolute; inset: 0;
  display: none;
  overflow-y: auto;
  padding: 48px clamp(32px, 6vw, 120px);
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.15) transparent;
}
.pres-slide.active { display: block; }

.pres-slide .section-label { color: var(--green); }
.pres-slide .section-title { color: #fff; font-size: clamp(24px, 4vw, 44px); margin-bottom: 16px; }
.pres-slide .section-intro { color: rgba(255,255,255,0.6); font-size: 16px; max-width: 72ch; margin-bottom: 36px; }

.pres-slide .kicker { color: var(--green); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; }
.pres-slide h2 { color: #fff; font-size: clamp(32px, 6vw, 72px); font-weight: 700; letter-spacing: -0.035em; line-height: 1.05; margin-bottom: 20px; text-wrap: balance; }
.pres-slide .hero-body { color: rgba(255,255,255,0.6); font-size: 18px; max-width: 52ch; line-height: 1.6; margin-bottom: 36px; }
.pres-slide .hero-stats { border-color: rgba(255,255,255,0.12); }
.pres-slide .hero-stat { border-right-color: rgba(255,255,255,0.12); }
.pres-slide .hs-val { color: #fff; font-size: 28px; }
.pres-slide .hs-label { color: rgba(255,255,255,0.4); }
/* Prevent hero stats from wrapping to a second row in presentation */
.pres-slide .hero-stats { flex-wrap: nowrap; width: auto; }
.pres-slide .hero-stat { padding: 14px 20px; }

.pres-slide .version-card { border-color: rgba(255,255,255,0.12); }
.pres-slide .v1-hdr { background: rgba(255,255,255,0.06); }
.pres-slide .v1-hdr span:first-child { color: rgba(255,255,255,0.8); }
.pres-slide .version-list li { color: rgba(255,255,255,0.6); border-bottom-color: rgba(255,255,255,0.06); }
.pres-slide .callout { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); border-left-color: var(--green); color: rgba(255,255,255,0.6); }
.pres-slide .callout strong { color: #fff; }

.pres-slide .hw-grid { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.08); }
.pres-slide .hw-card { background: transparent; }
.pres-slide .hw-card:hover { background: rgba(255,255,255,0.05); }
.pres-slide .hw-name { color: #fff; }
.pres-slide .hw-desc { color: rgba(255,255,255,0.5); }

.pres-slide .lang-card { border-color: rgba(255,255,255,0.1); }
.pres-slide .lang-body { color: rgba(255,255,255,0.55); }
.pres-slide .lang-pros li { color: rgba(255,255,255,0.45); }
.pres-slide .sim-callout { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); }

.pres-slide .project-card { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); }
.pres-slide .project-img { background: rgba(255,255,255,0.06); border-bottom-color: rgba(255,255,255,0.08); }
.pres-slide .project-name { color: #fff; }
.pres-slide .project-desc { color: rgba(255,255,255,0.5); }
.pres-slide .project-domain { color: rgba(255,255,255,0.35); }
.pres-slide .tag { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }

.pres-slide .pitch-grid { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.08); }
.pres-slide .pitch-card { background: transparent; }
.pres-slide .pitch-title { color: #fff; }
.pres-slide .pitch-body { color: rgba(255,255,255,0.45); }
.pres-slide .pitch-num { color: rgba(255,255,255,0.1); }

.pres-slide .map-table { border-color: rgba(255,255,255,0.1); }
.pres-slide .map-table td { border-color: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); }
.pres-slide .map-table td:first-child { color: #fff; }
.pres-slide .rcja-banner { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); }

.pres-slide .photo-slot { border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); }

.pres-slide .code-ph-icon { background: rgba(255,255,255,0.08); }
.pres-slide .code-ph-title { color: #fff; }
.pres-slide .code-ph-body { color: rgba(255,255,255,0.45); }

/* Diagram slots on dark presentation background */
.pres-slide .diagram-slot { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); max-height: 140px; min-height: 0; }
.pres-slide .diagram-slot img { max-height: 116px; padding: 6px; object-fit: contain; }
.pres-slide .photo-row { margin-bottom: 12px; }
/* Tighter hw-grid in presentation so 9 cards + images fit on one slide */
.pres-slide .hw-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1px; }
.pres-slide .hw-card { padding: 10px 12px; }
.pres-slide .hw-icon { margin-bottom: 4px; }
.pres-slide .hw-name { font-size: 13px; margin-bottom: 4px; }
.pres-slide .hw-desc { font-size: 11px; line-height: 1.45; margin-bottom: 6px; }
.pres-slide .hw-tag { font-size: 9px; padding: 2px 5px; }

/* Continuation header for split slides */
.pres-cont-header {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 28px; padding-bottom: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.pres-cont-header .section-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--green);
}
.pres-cont-title {
  font-size: 16px; font-weight: 700;
  color: rgba(255,255,255,0.35);
}

/* Bottom fade on slides that have scrollable overflow */
.pres-slide::after {
  content: '';
  position: sticky;
  bottom: 0;
  display: block;
  height: 52px;
  margin-top: -52px;
  background: linear-gradient(transparent, var(--navy));
  pointer-events: none;
  opacity: 0;
  transition: opacity 200ms;
}
.pres-slide.can-scroll::after { opacity: 1; }

.pres-slide .code-block { background: rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.1); }
.pres-slide .code-filename { background: rgba(0,0,0,0.3); }
.pres-slide .pin-table { border-color: rgba(255,255,255,0.1); }
.pres-slide .pin-table td { border-color: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); }
.pres-slide .code-ref h3 { color: #fff; }

/* General text overrides — catch all prose paragraphs, headings, list items */
.pres-slide p { color: rgba(255,255,255,0.6); }
.pres-slide h3 { color: #fff; }
.pres-slide li { color: rgba(255,255,255,0.6); }
.pres-slide th { color: rgba(255,255,255,0.45); background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); }
.pres-slide a { color: var(--green); }

/* Sim callout */
.pres-slide .sim-title { color: #fff; }
.pres-slide .sim-body { color: rgba(255,255,255,0.55); }
.pres-slide .sim-link { color: var(--green); }

/* Language compare */
.pres-slide .lang-hdr { background: rgba(255,255,255,0.06); border-bottom-color: rgba(255,255,255,0.1); }
.pres-slide .lang-name { color: #fff; }

/* Activity cards */
.pres-slide .activity-grid { gap: 1px; background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.08); }
.pres-slide .activity-card { background: var(--navy); }
.pres-slide .activity-num { color: var(--green); }
.pres-slide .activity-title { color: #fff; }
.pres-slide .activity-cap { color: rgba(255,255,255,0.35); }
.pres-slide .activity-desc { color: rgba(255,255,255,0.5); }

/* Setup steps in coding section */
.pres-slide .setup-steps li { color: rgba(255,255,255,0.6); border-bottom-color: rgba(255,255,255,0.06); }

/* ── PRESENTATION NAV BAR ─────────────────────── */
#pres-nav {
  height: 56px;
  background: rgba(0,0,0,0.4);
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center;
  padding: 0 24px; gap: 12px;
  flex-shrink: 0;
}

.pres-btn {
  background: none; border: 1.5px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7); padding: 6px 14px;
  font-size: 13px; font-weight: 600;
  transition: background 80ms, border-color 80ms, color 80ms;
  display: flex; align-items: center; gap: 6px;
}
.pres-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.4); color: #fff; }
.pres-btn:disabled { opacity: 0.25; pointer-events: none; }

#pres-counter {
  flex: 1; text-align: center;
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.06em;
}

.pres-exit {
  background: none; border: 1.5px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.5); padding: 6px 12px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
  transition: background 80ms, color 80ms;
}
.pres-exit:hover { background: rgba(220,38,38,0.2); border-color: rgba(220,38,38,0.4); color: #fff; }

/* ── PRESENT BUTTON IN TOPBAR ─────────────────── */
#btn-present {
  background: none; border: 1.5px solid rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.8); padding: 5px 12px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  transition: background 80ms, border-color 80ms, color 80ms;
  display: flex; align-items: center; gap: 6px;
}
#btn-present:hover { background: var(--green); border-color: var(--green); color: var(--navy); }
#btn-present svg { width: 12px; height: 12px; fill: currentColor; }
</style>
</head>
<body>

<div id="progress"></div>

<header id="top-bar">
  <h1>micro:bit</h1>
  <button id="btn-present" onclick="enterPresentation()">
    <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    Present
  </button>
  <span class="top-pill">Workshop</span>
</header>

<div id="pres-overlay" role="dialog" aria-modal="true" aria-label="Presentation mode">
  <div id="pres-slides"></div>
  <div id="pres-nav">
    <button class="pres-btn" id="pres-prev" aria-label="Previous slide" onclick="presNav(-1)" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Prev
    </button>
    <span id="pres-counter">1 / 8</span>
    <button class="pres-btn" id="pres-next" aria-label="Next slide" onclick="presNav(1)">
      Next
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="pres-exit" aria-label="Exit presentation" onclick="exitPresentation()">&#x2715; Exit</button>
  </div>
</div>

<nav id="nav-bar" aria-label="Sections">
  <div id="nav-inner">
    <!-- NAV_TABS -->
  </div>
</nav>

<!-- HERO -->
<!-- SECTIONS_BEFORE_PAGE -->

<div class="page">
<!-- SECTIONS_IN_PAGE -->
</div>

<!-- SECTIONS_FULLWIDTH -->

<script>
const tabs     = document.querySelectorAll('.nav-tab');
const sections = [...document.querySelectorAll('.section')];
const bar      = document.getElementById('progress');

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const el = document.getElementById(tab.dataset.target);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
});

const tabObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const id = e.target.id;
      tabs.forEach(t => {
        const isActive = t.dataset.target === id;
        t.classList.toggle('active', isActive);
        t.setAttribute('aria-current', isActive ? 'true' : 'false');
      });
    }
  });
}, { rootMargin: '-52px 0px -55% 0px', threshold: 0 });

sections.forEach(s => { if (s) tabObs.observe(s); });

window.addEventListener('scroll', () => {
  const h = document.documentElement;
  bar.style.width = (h.scrollTop / (h.scrollHeight - h.clientHeight) * 100) + '%';
}, { passive: true });

// ── PRESENTATION MODE ─────────────────────────────────────────────
const overlay     = document.getElementById('pres-overlay');
const slidesEl    = document.getElementById('pres-slides');
const counterEl   = document.getElementById('pres-counter');
const prevBtn     = document.getElementById('pres-prev');
const nextBtn     = document.getElementById('pres-next');

let presSlides = [];
let presIdx    = 0;

function buildSlides() {
  slidesEl.innerHTML = '';
  presSlides = [];

  const sources = [
    document.getElementById('hero'),
    ...document.querySelectorAll('.section'),
  ].filter(Boolean);

  sources.forEach(src => {
    const parts = src.innerHTML.split(/<!--\s*SLIDE_BREAK\s*-->/i);

    // Build a quiet continuation header from this section's label + title
    const labelEl = src.querySelector('.section-label');
    const titleEl = src.querySelector('.section-title');
    let contHeader = '<div class="pres-cont-header">';
    if (labelEl) contHeader += `<span class="section-label">${labelEl.textContent}</span>`;
    if (titleEl) contHeader += `<span class="pres-cont-title">${titleEl.textContent}</span>`;
    contHeader += '</div>';

    parts.forEach((part, i) => {
      const slide = document.createElement('div');
      slide.className = 'pres-slide';
      slide.innerHTML = i === 0 ? part : contHeader + part;
      slidesEl.appendChild(slide);
      presSlides.push(slide);
    });
  });
}

function showSlide(idx) {
  presSlides.forEach((s, i) => s.classList.toggle('active', i === idx));
  presIdx = idx;
  counterEl.textContent = (idx + 1) + ' / ' + presSlides.length;
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === presSlides.length - 1;
  const slide = presSlides[idx];
  slide.scrollTop = 0;
  // Show bottom fade if slide content overflows
  requestAnimationFrame(() => {
    slide.classList.toggle('can-scroll', slide.scrollHeight > slide.clientHeight + 8);
  });
}

function updateScrollFade(slide) {
  const atBottom = slide.scrollTop + slide.clientHeight >= slide.scrollHeight - 8;
  slide.classList.toggle('can-scroll', !atBottom && slide.scrollHeight > slide.clientHeight + 8);
}

function presNav(dir) {
  const next = presIdx + dir;
  if (next >= 0 && next < presSlides.length) showSlide(next);
}

function enterPresentation() {
  buildSlides();
  showSlide(0);
  document.body.classList.add('presenting');
  // Update scroll fade as user scrolls each slide
  presSlides.forEach(slide => {
    slide.addEventListener('scroll', () => updateScrollFade(slide), { passive: true });
  });
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
}

function exitPresentation() {
  document.body.classList.remove('presenting');
  if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
}

document.addEventListener('keydown', e => {
  if (!document.body.classList.contains('presenting')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); presNav(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')                    { e.preventDefault(); presNav(-1); }
  if (e.key === 'Escape') exitPresentation();
});
</script>
</body>
</html>
